apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: middleware-hpa
  namespace: nyapsys
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: middleware
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70