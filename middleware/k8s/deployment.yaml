apiVersion: apps/v1
kind: Deployment
metadata:
  name: middleware
  namespace: nyapsys
spec:
  replicas: 1
  selector:
    matchLabels:
      app: middleware
  template:
    metadata:
      labels:
        app: middleware
    spec:
      containers:
      - name: middleware
        image: nyapsys/middleware:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        env:
        - name: API_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: nyapsys-secrets
              key: api-secret-key
        - name: BACKEND_URL
          value: "http://DROPLET_PRIVATE_VPC_IP:8000"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10