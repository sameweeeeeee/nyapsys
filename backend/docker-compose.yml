version: "3.9"

networks:
  nyapsys-net:
    driver: bridge

services:

  llama-server:
    image: ghcr.io/ggerganov/llama.cpp:server
    restart: always
    networks: [nyapsys-net]
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /volumes/models:/models:ro
    command: >
      --model /models/Nyapsys-11B-Vision.Q4_K_M.gguf
      --mmproj /models/mmproj-model-f16.gguf
      --host 0.0.0.0
      --port 8080
      --ctx-size 8192
      --n-predict 2048
      --threads 2
      --parallel 2
      --cont-batching
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  chromadb:
    image: chromadb/chroma:latest
    restart: always
    networks: [nyapsys-net]
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - /volumes/chromadb:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    build: .
    restart: always
    networks: [nyapsys-net]
    ports:
      - "8000:8000"
    volumes:
      - /volumes/sqlite:/volumes/sqlite
      - /volumes/chromadb:/volumes/chromadb
    env_file: .env
    environment:
      - LLAMA_HOST=http://llama-server:8080
      - CHROMA_HOST=http://chromadb:8000
    depends_on:
      llama-server:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s